<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerBridge Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Maseno Blue Theme */
        :root {
            --cb-electric: #2f63ff;
            --cb-electric-dark: #224be6;
            --cb-off-white: #f6f8ff;
            --cb-text: #17203a;
        }

        .navbar {
            /*background-color: #003366 !important;*/
            background: rgba(10, 20, 46, 0.9) !important;
            backdrop-filter: blur(8px);
        }

        .btn-primary {
            /*background-color: #003366;
            border-color: #003366;*/
            background-color: var(--cb-electric);
            border-color: var(--cb-electric);
        }

        body {
            /*background-color: #f8f9fa;*/
            background-color: var(--cb-off-white);
            color: var(--cb-text);
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            border-radius: 50%;
            background-color: #fff;
            padding: 2px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
        }

        .employer-portal-btn {
            background: linear-gradient(135deg, var(--cb-electric), #16b7ff);
            color: #fff !important;
            border-radius: 999px;
            padding: 8px 16px !important;
            font-weight: 600;
            margin-left: 8px;
            box-shadow: 0 10px 24px rgba(47, 99, 255, 0.35);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">CareerBridge</a>
            <!--<a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'home' %}">
                {% load static %}
                <img src="{% static 'images/portal.png' %}" alt="CareerBridge Logo" class="brand-logo me-2">
            </a>-->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                    <!--<a class="nav-link" href="{% url 'about' %}">About</a>-->
                    <a class="nav-link" href="{% url 'login' %}">Student Login</a>
                    <a class="nav-link employer-portal-btn" href="{% url 'register_employer' %}">Employer Portal</a>


                    <!--   <a class="nav-link" href="{% url 'register' %}">Sign up</a>--->
                    <!--<a class="nav-link" href="{% url 'jobs' %}">Available opportunities</a>
                    <a class="nav-link" href="{% url 'login' %}">Student Sign In</a>
                    <a class="nav-link" href="{% url 'register_employer' %}">Employer Portal</a>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'about' %}">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'jobs' %}">Opportunities</a>
                    </li>

                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button class="nav-link border-0 bg-transparent p-0">Logout</button>
                        </form>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Student Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link employer-portal-btn" href="{% url 'register_employer' %}">Employer Portal</a>
                    </li>
                    {% endif %}--->
                </ul>
            </div>
        </div>
    </nav>


    <div class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
