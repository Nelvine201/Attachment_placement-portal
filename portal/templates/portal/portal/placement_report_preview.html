{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
            <h3 class="mb-1">Employer Placement Tracking Report</h3>
            <p class="text-muted mb-0">Preview your filtered report before downloading.</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'all_applications' %}?{{ query_string }}" class="btn btn-outline-secondary">Back to Report
                Table</a>
            <a href="{% url 'placement_report_pdf' %}?{{ query_string }}&download=1" class="btn btn-primary">Download
                PDF</a>
        </div>
    </div>

    {% if active_filter_labels %}
    <div class="alert alert-info py-2 mb-3">
        <strong>Applied filters:</strong> {{ active_filter_labels|join:', ' }}
    </div>
    {% endif %}

    <div class="card border-0 shadow-sm">
        <div class="ratio" style="--bs-aspect-ratio: 141%;">
            <iframe title="Placement Report PDF Preview" src="{% url 'placement_report_pdf' %}?{{ query_string }}"
                class="w-100 h-100 border-0"></iframe>
        </div>
    </div>
</div>
{% endblock %}
