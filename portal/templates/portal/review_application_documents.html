{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Application Documents</h2>
        <a href="{% url 'employer_dashboard' %}" class="btn btn-outline-primary">Back to Dashboard</a>
    </div>

    {% for document in documents %}
    <div class="card mb-4 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>{{ document.label }}</strong>
            <a href="{{ document.file.url }}" target="_blank" class="btn btn-sm btn-outline-secondary">Open in New
                Tab</a>
        </div>
        <div class="card-body">
            <object data="{{ document.file.url }}" type="application/pdf" width="100%" height="700">
                <iframe src="{{ document.file.url }}" width="100%" height="700" style="border:0;"></iframe>
            </object>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
