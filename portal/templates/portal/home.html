{% extends 'base.html' %}

{% block content %}

<style>
    .home-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 32px;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 12px 32px rgba(40, 55, 100, 0.12);
    }

    .hero-main {
        grid-column: span 12;
        padding: 44px;
        background: linear-gradient(135deg, #1E3A8A 0%, #0F766E 100%);
        color: #fff;
    }



    .hero-searchbar {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 10px;
        background: rgba(255, 255, 255, 0.15);
        padding: 12px;
        border-radius: 14px;
        backdrop-filter: blur(4px);
        margin-top: 24px;
    }

    .hero-link {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 700;
        transition: background-color 0.2s ease;
        color: #fff;
        background: #2563EB;
    }

    .hero-link:hover {
        background-color: #1D4ED8;
    }


    .fade-up {
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
    }

    @media (max-width: 991px) {
        .hero-searchbar {
            grid-template-columns: 1fr 1fr;
        }
    }

    @media (max-width: 640px) {
        .hero-searchbar {
            grid-template-columns: 1fr;
        }
    }
</style>

<section class="home-grid">
    <div class="hero-main glass-card fade-up">
        <p class="text-uppercase mb-2 fw-semibold">CareerBridge • Explore and discover</p>
        <h1 class="display-5 fw-bold">Explore and discover your ideal placement opportunity.</h1>
        <p class="mb-0">Quickly jump to all posted slots or view only currently active opportunities.</p>
        <div class="hero-searchbar">
            <a href="{% url 'jobs' %}?status=all" class="hero-link">All Posted Slots</a>
            <a href="{% url 'jobs' %}?status=active" class="hero-link">Active Slots Only</a>
        </div>

    </div>
</section>
<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.12 });

    document.querySelectorAll('.fade-up').forEach((el) => observer.observe(el));
</script>
{% endblock %}
