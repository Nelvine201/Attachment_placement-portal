<style>
    .home-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 32px;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 12px 32px rgba(40, 55, 100, 0.12);
    }

    .hero-main {
        grid-column: span 12;
        padding: 44px;
        background: linear-gradient(135deg, #1E3A8A 0%, #0F766E 100%);
        color: #fff;
    }

    .hero-side {
        grid-column: span 12;
        padding: 24px;
    }

    .stats-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    .tip-widget {
        grid-column: span 4;
        padding: 24px;
    }

    .section-title {
        margin-bottom: 16px;
    }

    .hero-searchbar {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr)) 160px;
        gap: 10px;
        background: rgba(255, 255, 255, 0.15);
        padding: 12px;
        border-radius: 14px;
        backdrop-filter: blur(4px);
        margin-top: 24px;
    }

    .hero-searchbar select,
    .hero-searchbar button {
        height: 48px;
        border-radius: 10px;
        border: none;
        font-size: 0.95rem;
    }

    .hero-searchbar select {
        padding: 0 10px;
        color: #0f172a;
        background: #fff;
    }

    .hero-searchbar button {
        background: #2563EB;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }

    .hero-searchbar button:hover {
        background-color: #1D4ED8;
    }

    .popular-searches {
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .popular-chip {
        text-decoration: none;
        color: #0f172a;
        background: #fff;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 0.84rem;
        font-weight: 600;
    }

    .trending-track {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        padding-bottom: 8px;
        scroll-snap-type: x mandatory;
    }

    .trending-item {
        min-width: 280px;
        scroll-snap-align: start;
        padding: 20px;
    }

    .job-feed {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
    }

    .job-card {
        padding: 20px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
    }

    .job-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 30px rgba(47, 99, 255, 0.2);
        background: rgba(47, 99, 255, 0.08);
    }

    .stat-link {
        display: block;
        text-decoration: none;
        color: inherit;
        border-radius: 12px;
        padding: 8px;
        transition: background-color 0.2s ease;
    }

    .stat-link:hover {
        background-color: rgba(47, 99, 255, 0.08);
    }

    .quick-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
    }

    .quick-tag {
        font-size: 0.75rem;
        border-radius: 999px;
        padding: 4px 10px;
        background: rgba(47, 99, 255, 0.12);
        color: #2444b8;
        border: 1px solid rgba(47, 99, 255, 0.25);
    }

    .fade-up {
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
    }

    @media (max-width: 991px) {

        .hero-main,
        .hero-side,
        .tip-widget {
            grid-column: span 12;
        }

        .hero-searchbar {
            grid-template-columns: 1fr 1fr;
        }

        .hero-searchbar button {
            grid-column: span 2;
        }
    }

    @media (max-width: 640px) {
        .hero-searchbar {
            grid-template-columns: 1fr;
        }

        .hero-searchbar button {
            grid-column: span 1;
        }
    }
</style>

    <script>
        const quickViewModal = document.getElementById('jobQuickViewModal');
        if (quickViewModal) {
            quickViewModal.addEventListener('show.bs.modal', function (event) {
                const trigger = event.relatedTarget;
                document.getElementById('quickViewTitle').textContent = trigger.dataset.title;
                document.getElementById('quickViewCompany').textContent = trigger.dataset.company;
                document.getElementById('quickViewLocation').textContent = trigger.dataset.location;
                document.getElementById('quickViewDeadline').textContent = trigger.dataset.deadline;
                document.getElementById('quickViewDescription').textContent = trigger.dataset.description;
                document.getElementById('quickViewRequirements').textContent = trigger.dataset.requirements;
                document.getElementById('quickViewDetailsLink').href = trigger.dataset.link;
                const applyLink = document.getElementById('quickViewApplyLink');
                const deadlineNotice = document.getElementById('quickViewDeadlineNotice');
                if (applyLink) {
                    const isClosed = trigger.dataset.isClosed === 'true';
                    applyLink.href = trigger.dataset.applyLink;
                    if (isClosed) {
                        applyLink.classList.remove('btn-primary');
                        applyLink.classList.add('btn-danger', 'disabled');
                        applyLink.setAttribute('aria-disabled', 'true');
                        applyLink.textContent = 'Deadline has passed!! 😢';
                        applyLink.removeAttribute('href');
                        if (deadlineNotice) deadlineNotice.classList.remove('d-none');
                    } else {
                        applyLink.classList.remove('btn-danger', 'disabled');
                        applyLink.classList.add('btn-primary');
                        applyLink.removeAttribute('aria-disabled');
                        applyLink.textContent = 'Apply Now';
                        applyLink.href = trigger.dataset.applyLink;
                        if (deadlineNotice) deadlineNotice.classList.add('d-none');
                    }
                }
            });
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.12 });

        document.querySelectorAll('.fade-up').forEach((el) => observer.observe(el));
    </script>
    {% endfor %}
    {% endblock %}
