{% extends 'base.html' %}
{% block content %}
<h2>Available Placement Slots</h2>
<div class="row">
    {% for job in jobs %}
    <div class="col-md-4">
        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ job.title }}</h5>
                <p class="text-muted">{{ job.employer.company_name }} - {{ job.employer.location }}</p>
                <p>{{ job.description|truncatewords:20 }}</p>
                <a href="#" class="btn btn-outline-primary">View Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
